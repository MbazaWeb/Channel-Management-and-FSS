    <!-- Service Worker Registration with Cache Clear -->
    <script>
      if ('serviceWorker' in navigator) {
        // Clear all caches and unregister old service workers first
        window.addEventListener('load', async () => {
          try {
            // Unregister all existing service workers
            const registrations = await navigator.serviceWorker.getRegistrations();
            for (const registration of registrations) {
              await registration.unregister();
              console.log('Unregistered old SW:', registration.scope);
            }
            
            // Clear all caches
            const cacheNames = await caches.keys();
            for (const cacheName of cacheNames) {
              await caches.delete(cacheName);
              console.log('Deleted cache:', cacheName);
            }
            
            // Register fresh service worker
            const registration = await navigator.serviceWorker.register('/sw.js?v=3');
            console.log('SW registered:', registration.scope);
          } catch (error) {
            console.log('SW error:', error);
          }
        });
      }
    </script>
